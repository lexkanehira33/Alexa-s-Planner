<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg:#080808;--bg2:#0f0f0f;--bg3:#161616;--bg4:#1c1c1c;
    --border:#222222;--border2:#333333;
    --purple:#a393d6;--purple2:#7c6bbf;--purple3:#534ab7;--purple-soft:#1a1628;
    --grey:#b4b2a9;--grey2:#888780;--grey3:#444441;
    --text:#e8e4f0;--text2:#a8a4b8;--text3:#555260;
    --accent:#c4b5f0;--radius:12px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
  .nav{display:flex;gap:4px;padding:14px 16px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;align-items:center;flex-wrap:wrap;}
  .nav-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;transition:all 0.2s;}
  .nav-btn.active{background:var(--purple-soft);border-color:var(--purple2);color:var(--accent);}
  .nav-btn:hover:not(.active){border-color:var(--border2);color:var(--text);}
  .nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
  .sync-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;transition:all 0.2s;}
  .sync-btn:hover{border-color:var(--purple2);color:var(--accent);}
  .sync-btn.spinning{animation:spin 1s linear infinite;}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .gcal-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;transition:all 0.2s;}
  .gcal-btn.connected{border-color:#1d9e75;color:#5dcaa5;}
  .gcal-btn:hover{border-color:var(--purple2);color:var(--accent);}
  .page{display:none;padding:20px;max-width:960px;margin:0 auto;}
  .page.active{display:block;}

  /* WEEK */
  .week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .week-title{font-size:18px;font-weight:500;color:var(--accent);}
  .week-nav{display:flex;gap:8px;}
  .week-nav button{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:14px;transition:all 0.2s;}
  .week-nav button:hover{border-color:var(--purple2);color:var(--accent);}
  .glance-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px;}
  .section-label{font-size:11px;font-weight:500;letter-spacing:0.08em;color:var(--purple);text-transform:uppercase;margin-bottom:10px;}
  .due-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;min-height:28px;}
  .chip{padding:4px 12px;border-radius:20px;font-size:12px;border:1px solid;}
  .chip-empty{color:var(--text3);font-size:12px;font-style:italic;padding:4px 0;}
  .divider{border-top:1px solid var(--border);margin:12px 0;}
  .todo-input-row{display:flex;gap:8px;margin-top:8px;}
  .todo-input-row input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;color:var(--text);font-size:13px;outline:none;}
  .todo-input-row input:focus{border-color:var(--purple2);}
  .todo-input-row button{background:var(--purple-soft);border:1px solid var(--purple2);color:var(--accent);padding:8px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;}
  .todo-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);}
  .todo-item:last-child{border-bottom:none;}
  .todo-item input[type=checkbox]{margin-top:2px;accent-color:var(--purple3);width:15px;height:15px;cursor:pointer;flex-shrink:0;}
  .todo-item label{font-size:13px;color:var(--text2);cursor:pointer;line-height:1.4;}
  .todo-item.done label{text-decoration:line-through;color:var(--text3);}
  .todo-item .del{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0 4px;flex-shrink:0;}
  .todo-item .del:hover{color:#e24b4a;}
  .days-grid{display:flex;flex-direction:column;gap:10px;}
  .day-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .day-card.today{border-color:var(--purple2);}
  .day-header{background:var(--bg3);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
  .day-name{font-size:13px;font-weight:500;color:var(--accent);}
  .day-date{font-size:12px;color:var(--text3);margin-left:8px;}
  .day-toggle{color:var(--text3);font-size:12px;transition:transform 0.2s;}
  .day-toggle.open{transform:rotate(180deg);}
  .day-body{padding:14px 16px;display:none;}
  .day-body.open{display:block;}
  .day-section{margin-bottom:14px;}
  .day-section:last-child{margin-bottom:0;}
  .day-section-label{font-size:10px;font-weight:500;letter-spacing:0.07em;color:var(--grey2);text-transform:uppercase;margin-bottom:6px;}
  .day-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);font-size:13px;resize:none;outline:none;font-family:inherit;line-height:1.5;}
  .day-textarea:focus{border-color:var(--purple2);}

  /* SHOPPING */
  .lists-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;}
  .list-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
  .list-title{font-size:14px;font-weight:500;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
  .list-title .clear-btn{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 6px;}
  .list-title .clear-btn:hover{color:var(--purple);}

  /* SPENDING */
  .spending-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  @media(max-width:680px){.spending-layout{grid-template-columns:1fr;}}
  .spending-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
  .spending-panel-title{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:14px;}
  .form-row{margin-bottom:10px;}
  .form-row label{font-size:11px;color:var(--text3);display:block;margin-bottom:4px;}
  .form-row input,.form-row select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);font-size:13px;outline:none;}
  .form-row input:focus,.form-row select:focus{border-color:var(--purple2);}
  .form-row select option{background:var(--bg3);}
  /* FIXED RADIO BUTTONS */
  .radio-row{display:flex;gap:16px;margin-top:6px;flex-wrap:wrap;}
  .radio-label{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;line-height:1;}
  .radio-label input[type=radio]{width:14px;height:14px;accent-color:var(--purple3);cursor:pointer;flex-shrink:0;margin:0;}
  .submit-btn{width:100%;padding:9px;background:var(--purple-soft);border:1px solid var(--purple2);color:var(--accent);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;margin-top:6px;}
  .entries-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
  .entries-table th{text-align:left;padding:6px 8px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);font-size:11px;letter-spacing:0.05em;}
  .entries-table td{padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text2);}
  .entries-table tr:last-child td{border-bottom:none;}
  .entries-table .del-entry{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;}
  .entries-table .del-entry:hover{color:#e24b4a;}
  .tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;}
  .tag-need{background:#0d1f14;color:#5dcaa5;border:1px solid #1d4030;}
  .tag-want{background:#1a0d28;color:#a393d6;border:1px solid #3d2b6b;}
  .tag-income{background:#0d1520;color:#6db8e0;border:1px solid #1a3a50;}
  .chart-wrap{position:relative;height:220px;display:flex;align-items:center;justify-content:center;}
  canvas#donutChart{max-width:220px;max-height:220px;}
  .chart-legend{display:flex;flex-direction:column;gap:6px;margin-top:12px;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .spending-summary{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;}
  .summary-stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;flex:1;min-width:100px;}
  .summary-stat-label{font-size:10px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px;}
  .summary-stat-val{font-size:18px;font-weight:600;color:var(--accent);}
  .month-archive{margin-top:20px;}
  .month-archive-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
  .archive-month-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:8px;font-size:12px;}
  .archive-month-label{font-size:13px;font-weight:500;color:var(--purple);margin-bottom:6px;}
  .archive-month-breakdown{display:flex;flex-wrap:wrap;gap:8px;}
  .archive-pill{padding:3px 10px;border-radius:10px;font-size:11px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);}
  .month-archive-end-btn{padding:7px 14px;border-radius:var(--radius-sm);background:transparent;border:1px solid var(--border2);color:var(--text3);cursor:pointer;font-size:12px;}
  .month-archive-end-btn:hover{border-color:var(--purple2);color:var(--accent);}
  .no-entries{color:var(--text3);font-size:12px;font-style:italic;padding:8px 0;}
  .last-synced{font-size:11px;color:var(--text3);margin-left:4px;}
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('weekly',this)">Weekly</button>
  <button class="nav-btn" onclick="showPage('shopping',this)">Shopping</button>
  <button class="nav-btn" onclick="showPage('spending',this)">Spending</button>
  <div class="nav-right">
    <span class="last-synced" id="lastSynced"></span>
    <button class="sync-btn" id="syncBtn" onclick="syncCalendar()" style="display:none">↻ Sync</button>
    <button class="gcal-btn" id="gcalBtn" onclick="handleGcalAuth()">
      <span id="gcalStatus">Connect Google Calendar</span>
    </button>
  </div>
</nav>

<!-- WEEKLY -->
<div id="weekly" class="page active">
  <div class="week-header">
    <div class="week-title" id="weekTitle"></div>
    <div class="week-nav">
      <button onclick="changeWeek(-1)">&#8249;</button>
      <button onclick="changeWeek(0)">Today</button>
      <button onclick="changeWeek(1)">&#8250;</button>
    </div>
  </div>
  <div class="glance-card">
    <div class="section-label">Appointments this week</div>
    <div class="due-chips" id="apptChips"><span class="chip-empty">Connect Google Calendar to see appointments</span></div>
    <div class="divider"></div>
    <div class="section-label">School due this week</div>
    <div class="due-chips" id="dueChips"><span class="chip-empty">Connect Google Calendar to see due dates</span></div>
    <div class="divider"></div>
    <div class="section-label">Weekly to-do</div>
    <div id="weeklyTodos"></div>
    <div class="todo-input-row">
      <input type="text" id="weeklyInput" placeholder="Add to weekly list..." onkeydown="if(event.key==='Enter')addWeeklyTodo()">
      <button onclick="addWeeklyTodo()">Add</button>
    </div>
  </div>
  <div class="days-grid" id="daysGrid"></div>
</div>

<!-- SHOPPING -->
<div id="shopping" class="page">
  <div class="lists-grid" id="shoppingLists"></div>
</div>

<!-- SPENDING -->
<div id="spending" class="page">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
    <div style="font-size:18px;font-weight:500;color:var(--accent)" id="spendingMonthTitle"></div>
    <button class="month-archive-end-btn" onclick="endMonth()">Archive this month →</button>
  </div>
  <div class="spending-summary" id="spendingSummary"></div>
  <div class="spending-layout">
    <div>
      <div class="spending-panel">
        <div class="spending-panel-title">Add Entry</div>
        <div class="form-row">
          <label>Date</label>
          <input type="date" id="entryDate">
        </div>
        <div class="form-row">
          <label>Name / Description</label>
          <input type="text" id="entryName" placeholder="e.g. Spotify, Whole Foods...">
        </div>
        <div class="form-row">
          <label>Amount ($)</label>
          <input type="number" id="entryAmount" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="form-row">
          <label>Type</label>
          <div class="radio-row">
            <label class="radio-label"><input type="radio" name="entryType" value="spending" checked onchange="toggleCatField(this)"> Spending</label>
            <label class="radio-label"><input type="radio" name="entryType" value="income" onchange="toggleCatField(this)"> Income</label>
          </div>
        </div>
        <div id="catFields">
          <div class="form-row">
            <label>Category</label>
            <select id="entryCategory">
              <option value="bills">Bills</option>
              <option value="grocery">Grocery</option>
              <option value="health">Health / Beauty</option>
              <option value="misc">Misc</option>
            </select>
          </div>
          <div class="form-row">
            <label>Want or Need?</label>
            <div class="radio-row">
              <label class="radio-label"><input type="radio" name="wantNeed" value="need" checked> Need</label>
              <label class="radio-label"><input type="radio" name="wantNeed" value="want"> Want</label>
            </div>
          </div>
        </div>
        <button class="submit-btn" onclick="addEntry()">Add Entry</button>
      </div>
    </div>
    <div>
      <div class="spending-panel" style="margin-bottom:16px;">
        <div class="spending-panel-title">This Month</div>
        <div class="chart-wrap"><canvas id="donutChart" width="220" height="220"></canvas></div>
        <div class="chart-legend" id="chartLegend"></div>
      </div>
    </div>
  </div>
  <div class="spending-panel" style="margin-top:4px;">
    <div class="spending-panel-title">Entries</div>
    <div id="entriesTable"></div>
  </div>
  <div class="month-archive" id="monthArchive"></div>
</div>

<script>
const CLIENT_ID='275549994850-knh5mqkh36io08c7ingl5i1v8k2hfrd6.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/calendar.readonly';
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

let weekOffset=0;
let accessToken=null;

let state=JSON.parse(localStorage.getItem('plannerState4')||'null')||{
  weeklyTodos:{},daySchedule:{},daySchool:{},dayTodos:{},
  shopping:{sams:[],misc:[],grocery:[]},
  calEvents:{},lastSynced:null,
  spending:{entries:[],archived:[]}
};
if(!state.spending) state.spending={entries:[],archived:[]};
if(!state.calEvents||Array.isArray(state.calEvents)) state.calEvents={};

function save(){ localStorage.setItem('plannerState4',JSON.stringify(state)); }

function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(btn) btn.classList.add('active');
  if(id==='spending'){renderSpending();}
}

// ─── GOOGLE AUTH ───────────────────────────────────────────────────────────
function handleGcalAuth(){
  if(accessToken){ disconnectGcal(); return; }
  const client=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID, scope:SCOPES,
    callback:(resp)=>{
      if(resp.access_token){
        accessToken=resp.access_token;
        document.getElementById('gcalBtn').classList.add('connected');
        document.getElementById('gcalStatus').textContent='Disconnect calendar';
        document.getElementById('syncBtn').style.display='block';
        fetchAndStoreEvents();
      }
    }
  });
  client.requestAccessToken();
}
function disconnectGcal(){
  accessToken=null;
  document.getElementById('gcalBtn').classList.remove('connected');
  document.getElementById('gcalStatus').textContent='Connect Google Calendar';
  document.getElementById('syncBtn').style.display='none';
}
async function syncCalendar(){
  if(!accessToken){ handleGcalAuth(); return; }
  const btn=document.getElementById('syncBtn');
  btn.classList.add('spinning');
  await fetchAndStoreEvents();
  btn.classList.remove('spinning');
}
async function fetchCalendarColors(){
  const r=await fetch('https://www.googleapis.com/calendar/v3/colors',{headers:{Authorization:'Bearer '+accessToken}});
  return await r.json();
}
async function fetchCalendarList(){
  const r=await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList',{headers:{Authorization:'Bearer '+accessToken}});
  return await r.json();
}
async function fetchAndStoreEvents(){
  try{
    const ws=getWeekStart(weekOffset);
    const we=new Date(ws); we.setDate(we.getDate()+7);
    const tMin=ws.toISOString(); const tMax=we.toISOString();
    const [calList,colorData]=await Promise.all([fetchCalendarList(),fetchCalendarColors()]);
    const cals=calList.items||[]; const eventColors=colorData.event||{};
    let apptEvents=[]; let schoolEvents=[];
    for(const cal of cals){
      const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?timeMin=${tMin}&timeMax=${tMax}&singleEvents=true&orderBy=startTime`;
      const r=await fetch(url,{headers:{Authorization:'Bearer '+accessToken}});
      const d=await r.json();
      const evts=(d.items||[]).map(e=>{
        let color=cal.backgroundColor||'#7c6bbf';
        if(e.colorId&&eventColors[e.colorId]) color=eventColors[e.colorId].background;
        return{...e,calName:cal.summary,calColor:color,calId:cal.id};
      });
      const name=cal.summary.trim();
      if(name==='School Assignments') schoolEvents.push(...evts);
      else if(name==='Alexa Kanehira'||name==='My Calendar'||cal.primary) apptEvents.push(...evts);
    }
    const wk=weekKey(weekOffset);
    if(!state.calEvents) state.calEvents={};
    state.calEvents[wk]={appt:apptEvents,school:schoolEvents};
    state.lastSynced=new Date().toISOString();
    save(); renderCalChips(); updateLastSyncedLabel();
  }catch(e){ console.error('Calendar fetch error',e); }
}
function renderCalChips(){
  const wk=weekKey(weekOffset);
  const weekData=state.calEvents&&state.calEvents[wk];
  renderChips('apptChips',weekData?weekData.appt:[],'personal');
  renderChips('dueChips',weekData?weekData.school:[],'school');
}
function renderChips(elId,events,type){
  const el=document.getElementById(elId);
  if(!events.length){ el.innerHTML='<span class="chip-empty">Nothing this week</span>'; return; }
  const ws=getWeekStart(weekOffset);
  const we=new Date(ws); we.setDate(we.getDate()+7);
  const filtered=events.filter(e=>{
    const start=e.start?.dateTime||e.start?.date||'';
    if(!start) return false;
    const d=start.includes('T')?new Date(start):new Date(start+'T00:00:00');
    return d>=ws&&d<we;
  });
  if(!filtered.length){ el.innerHTML='<span class="chip-empty">Nothing this week</span>'; return; }
  el.innerHTML=filtered.map(e=>{
    const start=e.start?.dateTime||e.start?.date||'';
    let d=null;
    if(start){ if(start.includes('T')){ d=new Date(start); } else { const[y,m,day]=start.split('-').map(Number); d=new Date(y,m-1,day); }}
    const dateStr=d?DAYS[d.getDay()].slice(0,3)+' '+d.getDate():'';
    const bg=type==='school'?'#0d0b14':'#0b0f0d';
    return `<span class="chip" style="background:${bg};border-color:${e.calColor};color:${e.calColor}">${dateStr?dateStr+' · ':''}${e.summary||'Event'}</span>`;
  }).join('');
}
function updateLastSyncedLabel(){
  if(!state.lastSynced) return;
  const d=new Date(state.lastSynced);
  const str=d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' at '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  document.getElementById('lastSynced').textContent='Synced '+str;
}

// ─── WEEK ──────────────────────────────────────────────────────────────────
function getWeekStart(offset){
  const d=new Date(); const day=d.getDay();
  const diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff+offset*7); d.setHours(0,0,0,0); return d;
}
function weekKey(offset){ return getWeekStart(offset).toISOString().slice(0,10); }
function dayKey(date){ return date.toISOString().slice(0,10); }
function changeWeek(dir){
  if(dir===0) weekOffset=0; else weekOffset+=dir;
  renderWeekly(); renderCalChips();
}
function renderWeekly(){
  const ws=getWeekStart(weekOffset);
  const we=new Date(ws); we.setDate(we.getDate()+6);
  document.getElementById('weekTitle').textContent=
    MONTHS[ws.getMonth()]+' '+ws.getDate()+' – '+
    (ws.getMonth()!==we.getMonth()?MONTHS[we.getMonth()]+' ':'')+we.getDate()+', '+we.getFullYear();
  const wk=weekKey(weekOffset);
  if(!state.weeklyTodos[wk]) state.weeklyTodos[wk]=[];
  renderWeeklyTodos(); renderDays(ws);
}
function renderWeeklyTodos(){
  const wk=weekKey(weekOffset);
  const todos=state.weeklyTodos[wk]||[];

function renderDays(ws){
  const today=new Date(); today.setHours(0,0,0,0);
  const grid=document.getElementById('daysGrid'); grid.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(ws); d.setDate(d.getDate()+i);
    const dk=dayKey(d); const isToday=d.getTime()===today.getTime();
    const card=document.createElement('div');
    card.className='day-card'+(isToday?' today':'');
    card.innerHTML=`
      <div class="day-header" onclick="toggleDay('${dk}',this)">
        <div><span class="day-name">${DAYS[d.getDay()]}</span><span class="day-date">${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}</span></div>
        <span class="day-toggle ${isToday?'open':''}">▾</span>
      </div>
      <div class="day-body ${isToday?'open':''}">
        <div class="day-section">
          <div class="day-section-label">Schedule</div>
          <div id="ds-${dk}"></div>

          <div id="dsc-${dk}"></div>

            <button onclick="addDaySchool('${dk}')">Add</button>

          <div class="day-section-label">To-do</div>
          <div id="dt-${dk}"></div>
          <div class="todo-input-row">
            <input type="text" id="dti-${dk}" placeholder="Add task..." onkeydown="if(event.key==='Enter')addDayTodo('${dk}')">

// ─── SPENDING ─────────────────────────────────────────────────────────────
const CAT_LABELS={bills:'Bills',grocery:'Grocery',health:'Health / Beauty',misc:'Misc',income:'Income'};
const CAT_COLORS={bills:'#7c6bbf',grocery:'#3d7a5c',health:'#7a3d5c',misc:'#4a7fa5',income:'#2a6e4a'};

function toggleCatField(el){ document.getElementById('catFields').style.display=el.value==='income'?'none':'block'; }

function getCurrentMonthKey(){
  const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
}

function addEntry(){
  const date=document.getElementById('entryDate').value;
  const name=document.getElementById('entryName').value.trim();
  const amount=parseFloat(document.getElementById('entryAmount').value);
  const type=document.querySelector('input[name="entryType"]:checked').value;
  if(!date||!name||isNaN(amount)||amount<=0) return;
  const entry={id:Date.now(),date,name,amount,type};
  if(type==='spending'){
    entry.category=document.getElementById('entryCategory').value;
    entry.wantNeed=document.querySelector('input[name="wantNeed"]:checked').value;
  }
  state.spending.entries.push(entry);
  save();
  document.getElementById('entryName').value='';
  document.getElementById('entryAmount').value='';
  renderSpending();
}

function deleteEntry(id){
  state.spending.entries=state.spending.entries.filter(e=>e.id!==id);
  save(); renderSpending();
}

function endMonth(){
  if(!confirm('Archive this month\'s data? Entries will be saved to the archive and the current list will clear.')) return;
  const mk=getCurrentMonthKey();
  const [y,m]=mk.split('-');
  const label=MONTHS[parseInt(m)-1]+' '+y;
  const entries=state.spending.entries;
  if(!entries.length){ alert('No entries to archive.'); return; }
  const cats={bills:0,grocery:0,health:0,misc:0};
  let totalSpend=0, totalIncome=0, needs=0, wants=0;
  entries.forEach(e=>{
    if(e.type==='income'){ totalIncome+=e.amount; }
    else { totalSpend+=e.amount; cats[e.category]=(cats[e.category]||0)+e.amount; if(e.wantNeed==='need') needs+=e.amount; else wants+=e.amount; }
  });
  state.spending.archived.unshift({label,mk,totalSpend,totalIncome,needs,wants,cats});
  state.spending.entries=[];
  save(); renderSpending();
}

function renderSpending(){
  const n=new Date();
  document.getElementById('spendingMonthTitle').textContent=MONTHS[n.getMonth()]+' '+n.getFullYear()+' — Spending';
  const entries=state.spending.entries;
  const cats={bills:0,grocery:0,health:0,misc:0};
  let totalSpend=0,totalIncome=0,needs=0,wants=0;
  entries.forEach(e=>{
    if(e.type==='income') totalIncome+=e.amount;
    else{ totalSpend+=e.amount; cats[e.category]=(cats[e.category]||0)+e.amount; if(e.wantNeed==='need') needs+=e.amount; else wants+=e.amount; }
  });
  const net=totalIncome-totalSpend;
  document.getElementById('spendingSummary').innerHTML=`
    <div class="summary-stat"><div class="summary-stat-label">Income</div><div class="summary-stat-val" style="color:#5dcaa5">$${totalIncome.toFixed(2)}</div></div>
    <div class="summary-stat"><div class="summary-stat-label">Spent</div><div class="summary-stat-val" style="color:#c084fc">$${totalSpend.toFixed(2)}</div></div>
    <div class="summary-stat"><div class="summary-stat-label">Net</div><div class="summary-stat-val" style="color:${net>=0?'#5dcaa5':'#e24b4a'}">$${net.toFixed(2)}</div></div>
    <div class="summary-stat"><div class="summary-stat-label">Needs</div><div class="summary-stat-val" style="color:#6db8e0">$${needs.toFixed(2)}</div></div>
    <div class="summary-stat"><div class="summary-stat-label">Wants</div><div class="summary-stat-val" style="color:#a393d6">$${wants.toFixed(2)}</div></div>`;
  drawDonut(cats, totalSpend);
  const sorted=[...entries].sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById('entriesTable').innerHTML=sorted.length?`
    <table class="entries-table">
      <thead><tr><th>Date</th><th>Name</th><th>Amount</th><th>Category</th><th>Type</th><th></th></tr></thead>
      <tbody>${sorted.map(e=>`
        <tr>
          <td>${e.date}</td><td>${e.name}</td><td>$${e.amount.toFixed(2)}</td>
          <td>${e.type==='income'?'—':CAT_LABELS[e.category]||e.category}</td>
          <td>${e.type==='income'?'<span class="tag tag-income">Income</span>':e.wantNeed==='need'?'<span class="tag tag-need">Need</span>':'<span class="tag tag-want">Want</span>'}</td>
          <td><button class="del-entry" onclick="deleteEntry(${e.id})">×</button></td>
        </tr>`).join('')}
      </tbody>
    </table>`:'<div class="no-entries">No entries yet — add one above</div>';
  const arch=document.getElementById('monthArchive');
  if(state.spending.archived.length){
    arch.innerHTML=`<div class="month-archive-title"><span>Past Months</span></div>`+
      state.spending.archived.map(a=>`
        <div class="archive-month-row">
          <div class="archive-month-label">${a.label}</div>
          <div class="archive-month-breakdown">
            <span class="archive-pill">Income $${a.totalIncome.toFixed(2)}</span>
            <span class="archive-pill">Spent $${a.totalSpend.toFixed(2)}</span>
            <span class="archive-pill">Net $${(a.totalIncome-a.totalSpend).toFixed(2)}</span>
            <span class="archive-pill">Needs $${a.needs.toFixed(2)}</span>
            <span class="archive-pill">Wants $${a.wants.toFixed(2)}</span>
            ${Object.entries(a.cats).filter(([,v])=>v>0).map(([k,v])=>`<span class="archive-pill">${CAT_LABELS[k]} $${v.toFixed(2)}</span>`).join('')}
          </div>
        </div>`).join('');
  } else { arch.innerHTML=''; }
}

// ─── DONUT CHART ──────────────────────────────────────────────────────────
function drawDonut(cats, total){
  const canvas=document.getElementById('donutChart');
  const ctx=canvas.getContext('2d');
  const W=220,H=220,cx=W/2,cy=H/2,r=80,inner=52;
  ctx.clearRect(0,0,W,H);
  const data=Object.entries(cats).filter(([,v])=>v>0);
  const legend=document.getElementById('chartLegend');
  if(!data.length){
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle='#1c1c1c'; ctx.fill();
    ctx.beginPath(); ctx.arc(cx,cy,inner,0,Math.PI*2); ctx.fillStyle='#080808'; ctx.fill();
    legend.innerHTML='<div style="color:var(--text3);font-size:12px;font-style:italic">No spending yet</div>';
    return;
  }
  let start=-Math.PI/2;
  data.forEach(([cat,val])=>{
    const slice=(val/total)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,start+slice); ctx.closePath();
    ctx.fillStyle=CAT_COLORS[cat]||'#555'; ctx.fill();
    start+=slice;
  });
  ctx.beginPath(); ctx.arc(cx,cy,inner,0,Math.PI*2); ctx.fillStyle='#080808'; ctx.fill();
  ctx.fillStyle='#c4b5f0'; ctx.font='bold 15px -apple-system,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('$'+total.toFixed(0),cx,cy-8);
  ctx.fillStyle='#555260'; ctx.font='11px -apple-system,sans-serif';
  ctx.fillText('this month',cx,cy+10);
  legend.innerHTML=data.map(([cat,val])=>`
    <div class="legend-item">
      <div class="legend-dot" style="background:${CAT_COLORS[cat]}"></div>
      <span>${CAT_LABELS[cat]}</span>
      <span style="margin-left:auto;color:var(--text3)">$${val.toFixed(2)} · ${Math.round(val/total*100)}%</span>
    </div>`).join('');
}
