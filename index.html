<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg:#080808;--bg2:#0f0f0f;--bg3:#161616;--bg4:#1c1c1c;
    --border:#222222;--border2:#333333;
    --purple:#a393d6;--purple2:#7c6bbf;--purple3:#534ab7;--purple-soft:#1a1628;
    --grey:#b4b2a9;--grey2:#888780;--grey3:#444441;
    --text:#e8e4f0;--text2:#a8a4b8;--text3:#555260;
    --accent:#c4b5f0;--radius:12px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
  .nav{display:flex;gap:4px;padding:14px 16px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;align-items:center;flex-wrap:wrap;}
  .nav-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;transition:all 0.2s;}
  .nav-btn.active{background:var(--purple-soft);border-color:var(--purple2);color:var(--accent);}
  .nav-btn:hover:not(.active){border-color:var(--border2);color:var(--text);}
  .nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
  .sync-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;transition:all 0.2s;}
  .sync-btn:hover{border-color:var(--purple2);color:var(--accent);}
  .sync-btn.spinning{animation:spin 1s linear infinite;}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .gcal-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;transition:all 0.2s;}
  .gcal-btn.connected{border-color:#1d9e75;color:#5dcaa5;}
  .gcal-btn:hover{border-color:var(--purple2);color:var(--accent);}
  .page{display:none;padding:20px;max-width:960px;margin:0 auto;}
  .page.active{display:block;}

  /* WEEK */
  .week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .week-title{font-size:18px;font-weight:500;color:var(--accent);}
  .week-nav{display:flex;gap:8px;}
  .week-nav button{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:14px;transition:all 0.2s;}
  .week-nav button:hover{border-color:var(--purple2);color:var(--accent);}
  .glance-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px;}
  .section-label{font-size:11px;font-weight:500;letter-spacing:0.08em;color:var(--purple);text-transform:uppercase;margin-bottom:10px;}
  .due-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;min-height:28px;}
  .chip{padding:4px 12px;border-radius:20px;font-size:12px;border:1px solid;cursor:pointer;transition:opacity 0.2s;}
  .chip:hover{opacity:0.75;}
  .chip.done{text-decoration:line-through;opacity:0.4;}
  .chip-empty{color:var(--text3);font-size:12px;font-style:italic;padding:4px 0;}
  .divider{border-top:1px solid var(--border);margin:12px 0;}
  .todo-input-row{display:flex;gap:8px;margin-top:8px;}
  .todo-input-row input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;color:var(--text);font-size:13px;outline:none;}
  .todo-input-row input:focus{border-color:var(--purple2);}
  .todo-input-row button{background:var(--purple-soft);border:1px solid var(--purple2);color:var(--accent);padding:8px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;}
  .todo-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);}
  .todo-item:last-child{border-bottom:none;}
  .todo-item input[type=checkbox]{margin-top:2px;accent-color:var(--purple3);width:15px;height:15px;cursor:pointer;flex-shrink:0;}
  .todo-item label{font-size:13px;color:var(--text2);cursor:pointer;line-height:1.4;}
  .todo-item.done label{text-decoration:line-through;color:var(--text3);}
  .todo-item .del{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0 4px;flex-shrink:0;}
  .todo-item .del:hover{color:#e24b4a;}
  .days-grid{display:flex;flex-direction:column;gap:10px;}
  .day-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .day-card.today{border-color:var(--purple2);}
  .day-header{background:var(--bg3);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
  .day-name{font-size:13px;font-weight:500;color:var(--accent);}
  .day-date{font-size:12px;color:var(--text3);margin-left:8px;}
  .day-toggle{color:var(--text3);font-size:12px;transition:transform 0.2s;}
  .day-toggle.open{transform:rotate(180deg);}
  .day-body{padding:14px 16px;display:none;}
  .day-body.open{display:block;}
  .day-section{margin-bottom:14px;}
  .day-section:last-child{margin-bottom:0;}
  .day-section-label{font-size:10px;font-weight:500;letter-spacing:0.07em;color:var(--grey2);text-transform:uppercase;margin-bottom:6px;}

  /* SHOPPING */
  .lists-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;}
  .list-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
  .list-title{font-size:14px;font-weight:500;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
  .list-title .clear-btn{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 6px;}
  .list-title .clear-btn:hover{color:var(--purple);}
  .last-synced{font-size:11px;color:var(--text3);margin-left:4px;}
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('weekly',this)">Weekly</button>
  <button class="nav-btn" onclick="showPage('shopping',this)">Shopping</button>
  <div class="nav-right">
    <span class="last-synced" id="lastSynced"></span>
    <button class="sync-btn" id="syncBtn" onclick="syncCalendar()" style="display:none">↻ Sync</button>
    <button class="gcal-btn" id="gcalBtn" onclick="handleGcalAuth()">
      <span id="gcalStatus">Connect Google Calendar</span>
    </button>
  </div>
</nav>

<!-- WEEKLY -->
<div id="weekly" class="page active">
  <div class="week-header">
    <div class="week-title" id="weekTitle"></div>
    <div class="week-nav">
      <button onclick="changeWeek(-1)">&#8249;</button>
      <button onclick="changeWeek(0)">Today</button>
      <button onclick="changeWeek(1)">&#8250;</button>
    </div>
  </div>
  <div class="glance-card">
    <div class="section-label">Appointments this week</div>
    <div class="due-chips" id="apptChips"><span class="chip-empty">Connect Google Calendar to see appointments</span></div>
    <div class="divider"></div>
    <div class="section-label">School due this week</div>
    <div class="due-chips" id="dueChips"><span class="chip-empty">Connect Google Calendar to see due dates</span></div>
    <div class="divider"></div>
    <div class="section-label">Weekly to-do</div>
    <div id="weeklyTodos"></div>
    <div class="todo-input-row">
      <input type="text" id="weeklyInput" placeholder="Add to weekly list..." onkeydown="if(event.key==='Enter')addWeeklyTodo()">
      <button onclick="addWeeklyTodo()">Add</button>
    </div>
  </div>
  <div class="days-grid" id="daysGrid"></div>
</div>

<!-- SHOPPING -->
<div id="shopping" class="page">
  <div class="lists-grid" id="shoppingLists"></div>
</div>

<script>
const CLIENT_ID='275549994850-knh5mqkh36io08c7ingl5i1v8k2hfrd6.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/calendar.readonly';
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

let weekOffset=0;
let accessToken=null;

let state=JSON.parse(localStorage.getItem('plannerState4')||'null')||{
  weeklyTodos:{},dayScheduleItems:{},daySchoolItems:{},dayTodos:{},
  shopping:{sams:[],misc:[],grocery:[]},
  calEvents:{},lastSynced:null,
  chipDone:{}
};
if(!state.calEvents||Array.isArray(state.calEvents)) state.calEvents={};
if(!state.chipDone) state.chipDone={};
if(!state.dayScheduleItems) state.dayScheduleItems={};
if(!state.daySchoolItems) state.daySchoolItems={};

function save(){ localStorage.setItem('plannerState4',JSON.stringify(state)); }

function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(btn) btn.classList.add('active');
}

// ─── GOOGLE AUTH ───────────────────────────────────────────────────────────
function handleGcalAuth(){
  if(accessToken){ disconnectGcal(); return; }
  const client=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID, scope:SCOPES,
    callback:(resp)=>{
      if(resp.access_token){
        accessToken=resp.access_token;
        document.getElementById('gcalBtn').classList.add('connected');
        document.getElementById('gcalStatus').textContent='Disconnect calendar';
        document.getElementById('syncBtn').style.display='block';
        fetchAndStoreEvents();
      }
    }
  });
  client.requestAccessToken();
}
function disconnectGcal(){
  accessToken=null;
  document.getElementById('gcalBtn').classList.remove('connected');
  document.getElementById('gcalStatus').textContent='Connect Google Calendar';
  document.getElementById('syncBtn').style.display='none';
}
async function syncCalendar(){
  if(!accessToken){ handleGcalAuth(); return; }
  const btn=document.getElementById('syncBtn');
  btn.classList.add('spinning');
  await fetchAndStoreEvents();
  btn.classList.remove('spinning');
}
async function fetchCalendarColors(){
  const r=await fetch('https://www.googleapis.com/calendar/v3/colors',{headers:{Authorization:'Bearer '+accessToken}});
  return await r.json();
}
async function fetchCalendarList(){
  const r=await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList',{headers:{Authorization:'Bearer '+accessToken}});
  return await r.json();
}
async function fetchAndStoreEvents(){
  try{
    const ws=getWeekStart(weekOffset);
    const we=new Date(ws); we.setDate(we.getDate()+7);
    const tMin=ws.toISOString(); const tMax=we.toISOString();
    const [calList,colorData]=await Promise.all([fetchCalendarList(),fetchCalendarColors()]);
    const cals=calList.items||[]; const eventColors=colorData.event||{};
    let apptEvents=[]; let schoolEvents=[];
    for(const cal of cals){
      const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?timeMin=${tMin}&timeMax=${tMax}&singleEvents=true&orderBy=startTime`;
      const r=await fetch(url,{headers:{Authorization:'Bearer '+accessToken}});
      const d=await r.json();
      const evts=(d.items||[]).map(e=>{
        let color=cal.backgroundColor||'#7c6bbf';
        if(e.colorId&&eventColors[e.colorId]) color=eventColors[e.colorId].background;
        return{...e,calName:cal.summary,calColor:color,calId:cal.id};
      });
      const name=cal.summary.trim();
      if(name==='School Assignments') schoolEvents.push(...evts);
      else if(name==='Alexa Kanehira'||name==='My Calendar'||cal.primary) apptEvents.push(...evts);
    }
    const wk=weekKey(weekOffset);
    if(!state.calEvents) state.calEvents={};
    state.calEvents[wk]={appt:apptEvents,school:schoolEvents};
    state.lastSynced=new Date().toISOString();
    save(); renderCalChips(); updateLastSyncedLabel();
  }catch(e){ console.error('Calendar fetch error',e); }
}

function chipDoneKey(wk, type, eventId){ return `${wk}__${type}__${eventId}`; }

function toggleChip(wk, type, eventId){
  const key=chipDoneKey(wk,type,eventId);
  state.chipDone[key]=!state.chipDone[key];
  save();
  renderCalChips();
}

function renderCalChips(){
  const wk=weekKey(weekOffset);
  const weekData=state.calEvents&&state.calEvents[wk];
  renderChips('apptChips',weekData?weekData.appt:[],'appt',wk);
  renderChips('dueChips',weekData?weekData.school:[],'school',wk);
}

function renderChips(elId,events,type,wk){
  const el=document.getElementById(elId);
  if(!events||!events.length){ el.innerHTML='<span class="chip-empty">Nothing this week</span>'; return; }
  const ws=getWeekStart(weekOffset);
  const we=new Date(ws); we.setDate(we.getDate()+7);
  const filtered=events.filter(e=>{
    const start=e.start?.dateTime||e.start?.date||'';
    if(!start) return false;
    const d=start.includes('T')?new Date(start):new Date(start+'T00:00:00');
    return d>=ws&&d<we;
  });
  if(!filtered.length){ el.innerHTML='<span class="chip-empty">Nothing this week</span>'; return; }
  el.innerHTML=filtered.map(e=>{
    const start=e.start?.dateTime||e.start?.date||'';
    let d=null;
    if(start){ if(start.includes('T')){ d=new Date(start); } else { const[y,m,day]=start.split('-').map(Number); d=new Date(y,m-1,day); }}
    const dateStr=d?DAYS[d.getDay()].slice(0,3)+' '+d.getDate():'';
    const bg=type==='school'?'#0d0b14':'#0b0f0d';
    const key=chipDoneKey(wk,type,e.id||e.summary);
    const done=state.chipDone[key]||false;
    return `<span class="chip${done?' done':''}" style="background:${bg};border-color:${e.calColor};color:${done?'var(--text3)':e.calColor}" onclick="toggleChip('${wk}','${type}','${(e.id||e.summary).replace(/'/g,"\\'")}')">
      ${dateStr?dateStr+' · ':''}${e.summary||'Event'}
    </span>`;
  }).join('');
}

function updateLastSyncedLabel(){
  if(!state.lastSynced) return;
  const d=new Date(state.lastSynced);
  const str=d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' at '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  document.getElementById('lastSynced').textContent='Synced '+str;
}

// ─── WEEK ──────────────────────────────────────────────────────────────────
function getWeekStart(offset){
  const d=new Date(); const day=d.getDay();
  const diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff+offset*7); d.setHours(0,0,0,0); return d;
}
function weekKey(offset){ return getWeekStart(offset).toISOString().slice(0,10); }
function dayKey(date){ return date.toISOString().slice(0,10); }
function changeWeek(dir){
  if(dir===0) weekOffset=0; else weekOffset+=dir;
  renderWeekly(); renderCalChips();
}
function renderWeekly(){
  const ws=getWeekStart(weekOffset);
  const we=new Date(ws); we.setDate(we.getDate()+6);
  document.getElementById('weekTitle').textContent=
    MONTHS[ws.getMonth()]+' '+ws.getDate()+' – '+
    (ws.getMonth()!==we.getMonth()?MONTHS[we.getMonth()]+' ':'')+we.getDate()+', '+we.getFullYear();
  const wk=weekKey(weekOffset);
  if(!state.weeklyTodos[wk]) state.weeklyTodos[wk]=[];
  renderWeeklyTodos(); renderDays(ws);
}
function renderWeeklyTodos(){
  const wk=weekKey(weekOffset);
  const todos=state.weeklyTodos[wk]||[];
  document.getElementById('weeklyTodos').innerHTML=todos.map((t,i)=>`
    <div class="todo-item ${t.done?'done':''}">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggleWeekly(${i})">
      <label onclick="toggleWeekly(${i})">${t.text}</label>
      <button class="del" onclick="deleteWeekly(${i})">×</button>
    </div>`).join('');
}
function addWeeklyTodo(){ const inp=document.getElementById('weeklyInput'); const v=inp.value.trim(); if(!v) return; const wk=weekKey(weekOffset); if(!state.weeklyTodos[wk]) state.weeklyTodos[wk]=[]; state.weeklyTodos[wk].push({text:v,done:false}); inp.value=''; save(); renderWeeklyTodos(); }
function toggleWeekly(i){ const wk=weekKey(weekOffset); state.weeklyTodos[wk][i].done=!state.weeklyTodos[wk][i].done; save(); renderWeeklyTodos(); }
function deleteWeekly(i){ const wk=weekKey(weekOffset); state.weeklyTodos[wk].splice(i,1); save(); renderWeeklyTodos(); }

function renderDays(ws){
  const today=new Date(); today.setHours(0,0,0,0);
  const grid=document.getElementById('daysGrid'); grid.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(ws); d.setDate(d.getDate()+i);
    const dk=dayKey(d); const isToday=d.getTime()===today.getTime();
    const card=document.createElement('div');
    card.className='day-card'+(isToday?' today':'');
    card.innerHTML=`
      <div class="day-header" onclick="toggleDay('${dk}',this)">
        <div><span class="day-name">${DAYS[d.getDay()]}</span><span class="day-date">${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}</span></div>
        <span class="day-toggle ${isToday?'open':''}">▾</span>
      </div>
      <div class="day-body ${isToday?'open':''}">
        <div class="day-section">
          <div class="day-section-label">Schedule</div>
          <div id="ds-${dk}"></div>
          <div class="todo-input-row">
            <input type="text" id="dsi-${dk}" placeholder="Add schedule item..." onkeydown="if(event.key==='Enter')addDaySchedule('${dk}')">
            <button onclick="addDaySchedule('${dk}')">Add</button>
          </div>
        </div>
        <div class="day-section">
          <div class="day-section-label">School</div>
          <div id="dsc-${dk}"></div>
          <div class="todo-input-row">
            <input type="text" id="dsci-${dk}" placeholder="Add school task..." onkeydown="if(event.key==='Enter')addDaySchool('${dk}')">
            <button onclick="addDaySchool('${dk}')">Add</button>
          </div>
        </div>
        <div class="day-section">
          <div class="day-section-label">To-do</div>
          <div id="dt-${dk}"></div>
          <div class="todo-input-row">
            <input type="text" id="dti-${dk}" placeholder="Add task..." onkeydown="if(event.key==='Enter')addDayTodo('${dk}')">
            <button onclick="addDayTodo('${dk}')">Add</button>
          </div>
        </div>
      </div>`;
    grid.appendChild(card);
    renderDaySchedule(dk);
    renderDaySchool(dk);
    renderDayTodos(dk);
  }
}

function toggleDay(dk,header){ const body=header.nextElementSibling; const arrow=header.querySelector('.day-toggle'); body.classList.toggle('open'); arrow.classList.toggle('open'); }

function renderDayTodos(dk){ const todos=state.dayTodos&&state.dayTodos[dk]||[]; const el=document.getElementById('dt-'+dk); if(!el) return; el.innerHTML=todos.map((t,i)=>`<div class="todo-item ${t.done?'done':''}"><input type="checkbox" ${t.done?'checked':''} onchange="toggleDayTodo('${dk}',${i})"><label onclick="toggleDayTodo('${dk}',${i})">${t.text}</label><button class="del" onclick="deleteDayTodo('${dk}',${i})">×</button></div>`).join(''); }
function addDayTodo(dk){ const inp=document.getElementById('dti-'+dk); const v=inp.value.trim(); if(!v) return; if(!state.dayTodos) state.dayTodos={}; if(!state.dayTodos[dk]) state.dayTodos[dk]=[]; state.dayTodos[dk].push({text:v,done:false}); inp.value=''; save(); renderDayTodos(dk); }
function toggleDayTodo(dk,i){ state.dayTodos[dk][i].done=!state.dayTodos[dk][i].done; save(); renderDayTodos(dk); }
function deleteDayTodo(dk,i){ state.dayTodos[dk].splice(i,1); save(); renderDayTodos(dk); }

function renderDaySchedule(dk){ const items=state.dayScheduleItems&&state.dayScheduleItems[dk]||[]; const el=document.getElementById('ds-'+dk); if(!el) return; el.innerHTML=items.map((t,i)=>`<div class="todo-item ${t.done?'done':''}"><input type="checkbox" ${t.done?'checked':''} onchange="toggleDaySchedule('${dk}',${i})"><label onclick="toggleDaySchedule('${dk}',${i})">${t.text}</label><button class="del" onclick="deleteDaySchedule('${dk}',${i})">×</button></div>`).join(''); }
function addDaySchedule(dk){ const inp=document.getElementById('dsi-'+dk); const v=inp.value.trim(); if(!v) return; if(!state.dayScheduleItems) state.dayScheduleItems={}; if(!state.dayScheduleItems[dk]) state.dayScheduleItems[dk]=[]; state.dayScheduleItems[dk].push({text:v,done:false}); inp.value=''; save(); renderDaySchedule(dk); }
function toggleDaySchedule(dk,i){ state.dayScheduleItems[dk][i].done=!state.dayScheduleItems[dk][i].done; save(); renderDaySchedule(dk); }
function deleteDaySchedule(dk,i){ state.dayScheduleItems[dk].splice(i,1); save(); renderDaySchedule(dk); }

function renderDaySchool(dk){ const items=state.daySchoolItems&&state.daySchoolItems[dk]||[]; const el=document.getElementById('dsc-'+dk); if(!el) return; el.innerHTML=items.map((t,i)=>`<div class="todo-item ${t.done?'done':''}"><input type="checkbox" ${t.done?'checked':''} onchange="toggleDaySchool('${dk}',${i})"><label onclick="toggleDaySchool('${dk}',${i})">${t.text}</label><button class="del" onclick="deleteDaySchool('${dk}',${i})">×</button></div>`).join(''); }
function addDaySchool(dk){ const inp=document.getElementById('dsci-'+dk); const v=inp.value.trim(); if(!v) return; if(!state.daySchoolItems) state.daySchoolItems={}; if(!state.daySchoolItems[dk]) state.daySchoolItems[dk]=[]; state.daySchoolItems[dk].push({text:v,done:false}); inp.value=''; save(); renderDaySchool(dk); }
function toggleDaySchool(dk,i){ state.daySchoolItems[dk][i].done=!state.daySchoolItems[dk][i].done; save(); renderDaySchool(dk); }
function deleteDaySchool(dk,i){ state.daySchoolItems[dk].splice(i,1); save(); renderDaySchool(dk); }

// ─── SHOPPING ─────────────────────────────────────────────────────────────
const LISTS=[{key:'sams',label:"Sam's Club"},{key:'misc',label:'Misc'},{key:'grocery',label:'Weekly groceries'}];
function renderShopping(){ document.getElementById('shoppingLists').innerHTML=LISTS.map(l=>`<div class="list-card"><div class="list-title">${l.label}<button class="clear-btn" onclick="clearChecked('${l.key}')">Clear all checked</button></div><div id="sl-${l.key}"></div><div class="todo-input-row"><input type="text" id="sli-${l.key}" placeholder="Add item..." onkeydown="if(event.key==='Enter')addShop('${l.key}')"><button onclick="addShop('${l.key}')">Add</button></div></div>`).join(''); LISTS.forEach(l=>renderShopList(l.key)); }
function renderShopList(key){ const items=state.shopping[key]||[]; const el=document.getElementById('sl-'+key); if(!el) return; el.innerHTML=items.map((t,i)=>`<div class="todo-item"><input type="checkbox" onchange="checkShop('${key}',${i},this.checked)"><label>${t}</label><button class="del" onclick="deleteShop('${key}',${i})">×</button></div>`).join('')||'<div style="color:var(--text3);font-size:12px;padding:4px 0">List is empty</div>'; }
function addShop(key){ const inp=document.getElementById('sli-'+key); const v=inp.value.trim(); if(!v) return; state.shopping[key].push(v); inp.value=''; save(); renderShopList(key); }
function checkShop(key,i){ setTimeout(()=>{ state.shopping[key].splice(i,1); save(); renderShopList(key); },500); }
function deleteShop(key,i){ state.shopping[key].splice(i,1); save(); renderShopList(key); }
function clearChecked(key){ renderShopList(key); }

// ─── INIT ─────────────────────────────────────────────────────────────────
renderWeekly();
renderShopping();
renderCalChips();
updateLastSyncedLabel();
if(state.lastSynced) document.getElementById('syncBtn').style.display='block';
</script>
</body>
</html>
